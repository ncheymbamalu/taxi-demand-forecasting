ingest:
  raw_columns:
    - pickup_datetime
    - location_id
  processed_columns:
    - location_id
    - pickup_datetime
    - rides
train:
  XGBRegressor:
    objective: reg:squarederror 
    eval_metric: rmse 
    early_stopping_rounds: 50 
    n_jobs: -1
  LGBMRegressor:
    objective: regression
    metric: rmse
    early_stopping_rounds: 50
    verbosity: -1
    n_jobs: -1
hopsworks:
  project: taxi_demand_forecasting
  feature_group:
    name: univariate_time_series
    version: 1
    description: NYC taxi rides recorded at an hourly frequency
    primary_key:
      - location_id
      - unix_epoch_ms
    event_time: unix_epoch_ms
    online_enabled: True